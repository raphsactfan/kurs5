<div class="profile-page">
  <h2>Изменение профиля</h2>

  <div class="form-group">
    <label for="login">Новый логин:</label>
    <input [(ngModel)]="login" name="login" id="login" type="text" />
  </div>

  <div class="form-group">
    <label for="password">Новый пароль:</label>
    <input [(ngModel)]="password" name="password" id="password" type="password" />
  </div>

  <div class="form-group">
    <label for="confirmPassword">Подтвердите пароль:</label>
    <input [(ngModel)]="confirmPassword" name="confirmPassword" id="confirmPassword" type="password" />
  </div>

  <div class="buttons">
    <button class="save-btn" (click)="updateProfile()">Сохранить</button>
    <button class="back-btn" (click)="goToMain()">На главную</button>
  </div>
</div>
